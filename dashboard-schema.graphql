type SnapshotMeta {
  id: ID!
  generatedAt: AWSDateTime!
  presignedUrl: String!
}

type Query {
  getLatestSnapshot: SnapshotMeta
}

type Mutation {
  notifySnapshotUpdated(
    id: ID!
    generatedAt: AWSDateTime!
    presignedUrl: String!
  ): SnapshotMeta @aws_iam
}

type Subscription {
  onSnapshotUpdated: SnapshotMeta
    @aws_subscribe(mutations: ["notifySnapshotUpdated"])
}
